services:
  - type: web
    name: dsip-sniper
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install && npm run db:migrate && npm run seed
    startCommand: node src/api/server.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DB_PATH
        value: /opt/render/project/src/data/dsip-sniper.db
      - key: RECEIPTS_PATH
        value: /opt/render/project/src/receipts.jsonl
      - key: MERKLE_ROOT_PATH
        value: /opt/render/project/src/merkle_root.txt
      - key: DEMO_TOKEN_SECRET
        sync: false
      - key: MAGIC_LINK_SECRET
        sync: false
      - key: SAM_USE_FIXTURE
        value: "true"
      - key: KANON_MIN_TENANTS
        value: "5"
    disk:
      name: dsip-sniper-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
