<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>DSIP SENTINEL · ART EDITION</title>
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<header>
  <h1>DSIP SENTINEL</h1>
  <div class="stats-bar">
    <span class="stat"><span class="stat-val" id="stat-primes">—</span><span class="stat-lbl">PRIMES</span></span>
    <span class="stat-sep">·</span>
    <span class="stat"><span class="stat-val" id="stat-evaluates">—</span><span class="stat-lbl">EVALUATE</span></span>
    <span class="stat-sep">·</span>
    <span class="stat"><span class="stat-val" id="stat-closing">—</span><span class="stat-lbl">CLOSING</span></span>
    <span class="stat-sep">·</span>
    <span class="stat"><span class="stat-val" id="stat-art">—</span><span class="stat-lbl">ART STRONG</span></span>
    <span class="stat-sep">·</span>
    <span class="stat"><span class="stat-val" id="stat-pipeline">—</span><span class="stat-lbl">PIPELINE</span></span>
  </div>
  <div class="header-actions"></div>
</header>

<div class="tabs">
  <div class="tab active" data-tab="topics">Topics</div>
  <div class="tab" data-tab="art">ART Match</div>
  <div class="tab" data-tab="patterns">Component Patterns</div>
  <div class="tab" data-tab="admin">Admin</div>
</div>

<div class="layout">
  <div class="panel side collapsed" id="left-panel">
    <button class="panel-rail" id="left-rail" type="button" aria-label="Expand pipeline">
      <span class="rail-arrow">▶</span>
      <span class="rail-label">PIPELINE</span>
      <span class="rail-badge" id="pipeline-rail-badge">0</span>
    </button>
    <div class="panel-header" id="left-panel-header">
      <button class="panel-collapse" data-collapse="left" type="button" aria-label="Collapse pipeline">&lsaquo;</button>
      Pipeline <span class="count" id="pipeline-count">0</span>
    </div>
    <div class="panel-body scrollbar-thin" id="left-panel-body"></div>
  </div>
  <div class="panel center">
    <div class="filter-bar" id="filter-bar">
      <input type="search" id="filter-q" autocomplete="off" spellcheck="false" placeholder="search…">
      <select id="filter-component">
        <option value="">All 12 components</option>
        <option value="army">Army</option>
        <option value="air_force">Air Force</option>
        <option value="space_force">Space Force</option>
        <option value="cbd">CBD</option>
        <option value="darpa">DARPA</option>
        <option value="dla">DLA</option>
        <option value="dmea">DMEA</option>
        <option value="dtra">DTRA</option>
        <option value="mda">MDA</option>
        <option value="nga">NGA</option>
        <option value="osd">OSD</option>
        <option value="socom">SOCOM</option>
      </select>
      <select id="filter-tier">
        <option value="">All tiers</option>
        <option value="PRIME">PRIME</option>
        <option value="EVALUATE">EVALUATE</option>
        <option value="STRETCH">STRETCH</option>
        <option value="SKIP">SKIP</option>
      </select>
      <select id="filter-band" hidden>
        <option value="">All bands</option>
        <option value="STRONG">STRONG</option>
        <option value="PROMISING">PROMISING</option>
        <option value="WEAK">WEAK</option>
      </select>
      <label>Min score <input type="range" id="filter-score" min="0" max="100" value="0"> <span id="filter-score-val">0</span></label>
      <div class="filter-actions">
        <button id="digest-btn" class="filter-btn ghost" type="button" hidden>BRIEF</button>
        <button id="refresh-btn" class="filter-btn" type="button" hidden>⟳ SCAN DoW TOPICS</button>
      </div>
    </div>
    <div class="panel-header" id="center-panel-header">
      <span id="opp-label">Opportunities</span>
      <span class="count" id="opp-count">—</span>
      <a id="filter-clear" href="#" hidden>Clear</a>
    </div>
    <div class="panel-body scrollbar-thin" id="center-panel-body"></div>
  </div>
  <div class="panel side collapsed" id="right-panel">
    <button class="panel-rail" id="right-rail" type="button" aria-label="Expand diff feed">
      <span class="rail-arrow">◀</span>
      <span class="rail-label">DIFF FEED</span>
      <span class="rail-badge" id="diff-rail-badge">0</span>
    </button>
    <div class="panel-header" id="right-panel-header">
      <button class="panel-collapse" data-collapse="right" type="button" aria-label="Collapse diff feed">&lsaquo;</button>
      Diff feed <span class="count" id="diff-count">—</span>
    </div>
    <div class="panel-body scrollbar-thin" id="right-panel-body"></div>
  </div>
</div>


<div class="modal-overlay" id="why-modal" onclick="if(event.target===this) this.classList.remove('open')">
  <div class="modal scrollbar-thin" id="why-modal-content"></div>
</div>

<script src="/components/sandbox_banner.js"></script>
<script src="/components/score_reveal.js"></script>
<script src="/components/why_panel.js"></script>
<script src="/components/modals.js"></script>
<script src="/components/opportunity_card.js"></script>
<script src="/components/art_match_card.js"></script>
<script src="/components/pipeline_panel.js"></script>
<script src="/components/sponsor_pipeline_panel.js"></script>
<script src="/components/diff_feed.js"></script>
<script src="/components/component_patterns_static.js"></script>
<script src="/components/your_lens.js"></script>
<script src="/components/sba_flag.js"></script>
<script src="/components/filter_bar.js"></script>
<script src="/components/mobile_nav.js"></script>
<script src="/components/panel_collapse.js"></script>
<script src="/app.js"></script>
</body>
</html>
